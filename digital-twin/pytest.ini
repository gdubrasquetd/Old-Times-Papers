[pytest]
# Suite du composant digital-twin : la pipeline (ocr/build) + les métriques du benchmark.
testpaths = tests benchmark/tests
# Par défaut : uniquement les tests hermétiques (aucun modèle/GPU/réseau/subprocess réel).
addopts = -m "not integration"
markers =
    integration: nécessite modèles/GPU/réseau réels — exclu du run par défaut
