[pytest]
# Suite du composant block-detection : outil d'annotation + entraînement.
testpaths = annotation/tests training/tests
# Par défaut on ne lance QUE les tests hermétiques (aucun réseau/modèle/subprocess réel).
# Les tests d'intégration (marqués) sont exclus : `pytest -m integration` pour les lancer.
addopts = -m "not integration"
markers =
    integration: nécessite réseau/modèles/subprocess réels — exclu du run par défaut
